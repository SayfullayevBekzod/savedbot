services:
  - type: web
    name: savedbot-web
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python main.py
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ARQ_REDIS_URL
        sync: false
      - key: WEBHOOK_HOST
        sync: false
      - key: WEBHOOK_PATH
        value: /webhook
      - key: BACKEND_PORT
        value: "8000"
      - key: DOWNLOAD_DIR
        value: downloads
      - key: MAX_VIDEO_SIZE_MB
        value: "50"
      - key: AUTO_VIDEO_MAX_HEIGHT
        value: "480"
      - key: UPLOAD_CHUNK_SIZE_KB
        value: "4096"
      - key: DOWNLOAD_CONCURRENT_FRAGMENTS
        value: "256"
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "8"
      - key: COOLDOWN_SECONDS
        value: "0"
      - key: RECOGNITION_PROXY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: RUSTUP_HOME
        value: /tmp/rustup

  - type: worker
    name: savedbot-worker
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: arq bot.services.worker.WorkerSettings
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ARQ_REDIS_URL
        sync: false
      - key: DOWNLOAD_DIR
        value: downloads
      - key: MAX_VIDEO_SIZE_MB
        value: "50"
      - key: AUTO_VIDEO_MAX_HEIGHT
        value: "480"
      - key: DOWNLOAD_CONCURRENT_FRAGMENTS
        value: "256"
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "8"
      - key: COOLDOWN_SECONDS
        value: "0"
      - key: RECOGNITION_PROXY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: RUSTUP_HOME
        value: /tmp/rustup
